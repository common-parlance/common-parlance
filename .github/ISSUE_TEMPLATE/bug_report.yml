name: Bug Report
description: Report a bug in Common Parlance
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "common-parlance --version"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15, Ubuntu 24.04"
    validations:
      required: false
