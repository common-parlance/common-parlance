name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches the Python versions in pyproject classifiers / requires-python.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      # Lint/format are runtime-independent (ruff target-version is pinned), so
      # run them once rather than on every matrix leg.
      - name: Lint
        if: matrix.python-version == '3.12'
        run: uv run ruff check src/ tests/ ner-service/ scripts/

      - name: Format check
        if: matrix.python-version == '3.12'
        run: uv run ruff format --check src/ tests/ ner-service/ scripts/

      - name: Test
        run: uv run pytest tests/ -q

  ner-tests:
    # The NER/Presidio test tier (client PresidioScrubber + server ner-service +
    # the NER golden-corpus tier) is the proof that names/locations actually get
    # redacted. The lint-and-test job installs only the dev group, so those
    # tests pytest.importorskip away and pass-by-skipping — a scrubbing
    # regression would merge green. This job installs the `ner` extra and the
    # spaCy models and runs that tier as a real gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (with NER extra)
        run: uv sync --group dev --extra ner

      - name: Download spaCy models
        # en_core_web_lg = client PresidioScrubber; en_core_web_sm = ner-service.
        # `spacy download` shells out to `pip install <model-wheel>`, but uv
        # venvs don't seed pip — so install it, then use `uv run --no-sync` for
        # this and the steps below so uv doesn't re-sync and strip pip + the
        # ad-hoc-installed model packages back out.
        # (Follow-up: cache these to avoid the ~560MB lg download each run.)
        run: |
          uv pip install pip
          uv run --no-sync python -m spacy download en_core_web_sm
          uv run --no-sync python -m spacy download en_core_web_lg

      - name: Assert NER deps present (so the NER tier can't silently skip)
        run: uv run --no-sync python -c "import presidio_analyzer, presidio_anonymizer, spacy, en_core_web_sm, en_core_web_lg"

      - name: Run NER test tier
        run: uv run --no-sync pytest tests/test_golden_corpus_ner.py tests/test_scrub_ner.py tests/test_ner_service.py -q

  worker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # wrangler >=4.103 requires Node >=22 (the `deploy --dry-run` bundle
          # check below fails on 20 even though the tests pass on it).
          node-version: 22

      - name: Install dependencies
        run: cd worker && npm ci

      - name: Run Worker tests
        run: cd worker && npm test

      - name: Validate Worker bundle
        run: cd worker && npx wrangler deploy --dry-run

  ner-service-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build NER Docker image
        run: docker build -t ner-service-test ner-service/

      - name: Verify NER service starts
        run: |
          docker run -d --name ner-test -p 7860:7860 ner-service-test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7860/health; then break; fi
            if ! docker ps -q -f name=ner-test | grep -q .; then
              echo "Container exited unexpectedly:"
              docker logs ner-test
              exit 1
            fi
            sleep 2
          done
          curl -sf http://localhost:7860/health | grep '"ok":true'
          docker logs ner-test
          docker stop ner-test

  # --- Release jobs (tag push only) ---

  publish-pypi:
    needs: [lint-and-test, ner-tests, worker-check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy-worker:
    needs: [lint-and-test, ner-tests, worker-check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # wrangler >=4.103 (pinned in worker/package.json) requires Node >=22.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker

  github-release:
    needs: [publish-pypi, deploy-worker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
